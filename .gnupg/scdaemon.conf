card-timeout 5
# Fix sharing YubiKey with age-plugin-yubikey.
# WARNING: Not safe on systems you don't fully control.
# https://github.com/str4d/age-plugin-yubikey/issues/207
# FIXME: Breaks caching of YubiKey PIN.
#pcsc-shared

# Hide OpenPGP applet from scdaemon.
# GPG smartcard/SSH via OpenPGP will stop working.
#disable-application openpgp

# Prefer PIV applet when scdaemon auto-selects.
# Can make GPG OpenPGP card detection flaky.
#application-priority piv

# Disable GnuPG internal CCID USB driver.
# Force scdaemon through PC/SC / pcscd instead.
disable-ccid
